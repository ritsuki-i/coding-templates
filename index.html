<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="検索してすぐにコピーできるコーディングテンプレート集">
  <title>Code Shelf</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">LOCAL CODE LIBRARY</p>
      <h1>Code Shelf</h1>
      <p class="hero-copy">欲しい処理を入力して、見つけて、すぐコピー。</p>
    </div>
    <button id="openEditorButton" class="primary-button" type="button">＋ テンプレートを追加</button>
  </header>

  <main>
    <section class="search-panel" aria-label="テンプレート検索">
      <label class="search-box" for="searchInput">
        <span>検索</span>
        <input id="searchInput" type="search" placeholder="例: pandas 欠損値　可視化" autocomplete="off">
        <kbd>Ctrl K</kbd>
      </label>
      <div class="filters">
        <label>分野
          <select id="categoryFilter"><option value="">すべて</option></select>
        </label>
        <label>用途
          <select id="useCaseFilter"><option value="">すべて</option></select>
        </label>
        <label>言語
          <select id="languageFilter"><option value="">すべて</option></select>
        </label>
        <button id="clearFiltersButton" class="ghost-button" type="button">条件をクリア</button>
      </div>
    </section>

    <section class="summary-bar">
      <p><strong id="resultCount">0</strong> 件のテンプレート</p>
      <div class="data-actions">
        <button id="exportButton" class="text-button" type="button">JSONを書き出す</button>
        <label class="text-button file-button">JSONを読み込む
          <input id="importInput" type="file" accept="application/json,.json">
        </label>
        <button id="resetButton" class="text-button danger-text" type="button">初期データに戻す</button>
      </div>
    </section>

    <div id="message" class="message" role="status" hidden></div>

    <section class="table-shell" aria-label="検索結果">
      <table>
        <thead>
          <tr>
            <th class="title-column">テンプレート</th>
            <th>分野 / 用途</th>
            <th>説明</th>
            <th class="code-column">コード</th>
            <th class="action-column">操作</th>
          </tr>
        </thead>
        <tbody id="templateRows"></tbody>
      </table>
      <div id="emptyState" class="empty-state" hidden>
        <strong>一致するテンプレートがありません</strong>
        <span>検索語や絞り込み条件を変えてください。</span>
      </div>
    </section>
  </main>

  <dialog id="editorDialog">
    <form id="editorForm" method="dialog">
      <div class="dialog-heading">
        <div>
          <p class="eyebrow">TEMPLATE EDITOR</p>
          <h2 id="dialogTitle">テンプレートを追加</h2>
        </div>
        <button id="closeEditorButton" class="icon-button" type="button" aria-label="閉じる">×</button>
      </div>
      <input id="templateId" type="hidden">
      <div class="form-grid">
        <label>名前<input id="titleInput" required placeholder="例: CSVを読み込む"></label>
        <label>言語<input id="languageInput" required placeholder="例: Python"></label>
        <label>分野<input id="categoryInput" required placeholder="例: データ分析"></label>
        <label>用途<input id="useCaseInput" required placeholder="例: データ前処理"></label>
      </div>
      <label>説明<textarea id="descriptionInput" required rows="3" placeholder="何をするコードか"></textarea></label>
      <label>タグ<input id="tagsInput" placeholder="カンマ区切り: pandas, csv, 読み込み"></label>
      <label>コード<textarea id="codeInput" required rows="12" spellcheck="false" placeholder="コードを入力"></textarea></label>
      <div class="dialog-actions">
        <button id="cancelEditorButton" class="ghost-button" type="button">キャンセル</button>
        <button class="primary-button" type="submit">保存する</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
